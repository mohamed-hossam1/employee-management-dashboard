<main class="error-page" role="main" aria-labelledby="not-found-heading">
  <div class="error-page__card">
    <div class="error-page__illustration" aria-hidden="true">
      <span class="error-page__code">404</span>
      <span class="error-page__glyph">🔍</span>
    </div>
    <h1 id="not-found-heading" class="error-page__title">Page not found</h1>
    <p class="error-page__message">
      The page you are looking for does not exist or may have been moved.
    </p>
    <a routerLink="/" class="error-page__btn error-page__btn--primary">Go Home</a>
  </div>
</main>
