<main class="department-list" role="main" aria-labelledby="department-list-heading">
  <header class="department-list__header">
    <div>
      <h1 id="department-list-heading" class="department-list__title">Departments</h1>
      <p class="department-list__subtitle">
        Organize employees into departments for this project.
      </p>
    </div>
    <button type="button" class="department-list__btn department-list__btn--primary" (click)="openCreate()">
      Add department
    </button>
  </header>

  @if (initialLoad()) {
    <div
      class="department-list__skeleton"
      role="status"
      aria-busy="true"
      aria-label="Loading departments"
    >
      @for (row of [1, 2, 3, 4, 5, 6]; track row) {
        <app-skeleton variant="rectangle" width="100%" height="10rem" />
      }
    </div>
  } @else if (showEmpty()) {
    <app-empty-state
      title="No departments yet"
      message="Create your first department to start grouping employees."
      icon="🏢"
      actionText="Add department"
      (action)="openCreate()"
    />
  } @else {
    <ul class="department-list__grid">
      @for (dept of departmentsWithCounts(); track dept.id) {
        <li>
          <app-department-card
            [department]="dept"
            [managerName]="managerName(dept.managerId)"
            (open)="openDepartment(dept)"
            (edit)="openEdit(dept)"
            (delete)="requestDelete(dept)"
          />
        </li>
      }
    </ul>
  }

  @if (dialogOpen()) {
    <app-department-form-dialog
      [department]="editing()"
      [managers]="managerOptions()"
      [existingNames]="existingNames()"
      [saving]="saving()"
      (cancel)="closeDialog()"
      (save)="onSave($event)"
    />
  }

  <app-confirm-dialog
    [open]="!!deleteTarget()"
    title="Delete department"
    [message]="deleteMessage()"
    confirmText="Delete"
    cancelText="Cancel"
    (confirmed)="confirmDelete()"
    (cancelled)="closeDelete()"
  />
</main>
