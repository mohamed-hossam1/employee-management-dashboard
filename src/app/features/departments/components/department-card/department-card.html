<article
  class="dept-card"
  [attr.aria-labelledby]="'dept-' + department().id + '-name'"
>
  <div class="dept-card__top">
    <div class="dept-card__identity">
      <span class="dept-card__icon" aria-hidden="true">🏢</span>
      <div class="dept-card__titles">
        <h3 [id]="'dept-' + department().id + '-name'" class="dept-card__name">
          {{ department().name }}
        </h3>
        @if (department().description) {
          <p class="dept-card__description">{{ department().description }}</p>
        }
      </div>
    </div>
    <app-badge
      [text]="
        department().employeeCount +
        (department().employeeCount === 1 ? ' employee' : ' employees')
      "
      variant="info"
    />
  </div>

  <dl class="dept-card__meta">
    <div class="dept-card__meta-item">
      <dt class="dept-card__label">Manager</dt>
      <dd class="dept-card__value">{{ managerName() || 'Unassigned' }}</dd>
    </div>
  </dl>

  <div class="dept-card__actions">
    <button
      type="button"
      class="dept-card__action dept-card__action--primary"
      (click)="open.emit()"
    >
      View
    </button>
    <button
      type="button"
      class="dept-card__action"
      [attr.aria-label]="'Edit ' + department().name"
      (click)="edit.emit()"
    >
      Edit
    </button>
    <button
      type="button"
      class="dept-card__action dept-card__action--danger"
      [attr.aria-label]="'Delete ' + department().name"
      (click)="delete.emit()"
    >
      Delete
    </button>
  </div>
</article>
