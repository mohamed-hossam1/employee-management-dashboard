<article
  class="card"
  [class.card--active]="active()"
  [style.--accent]="project().color"
  [attr.aria-labelledby]="'project-' + project().id + '-name'"
>
  <header class="card__header">
    <span class="card__icon-wrap" aria-hidden="true">
      <span class="card__icon">{{ iconGlyph(project().icon) }}</span>
    </span>
    @if (active()) {
      <span class="card__badge">Active</span>
    } @else {
      <span class="card__badge card__badge--idle">Workspace</span>
    }
  </header>

  <div class="card__body">
    <h3 [id]="'project-' + project().id + '-name'" class="card__name">
      {{ project().name }}
    </h3>
    <p class="card__description">
      {{ project().description || 'No description yet.' }}
    </p>
  </div>

  <footer class="card__footer">
    <button
      type="button"
      class="card__btn card__btn--primary"
      (click)="activate.emit()"
    >
      {{ active() ? 'Open workspace' : 'Switch to workspace' }}
    </button>
    <div class="card__btn-row">
      <button
        type="button"
        class="card__btn card__btn--ghost"
        [attr.aria-label]="'Edit ' + project().name"
        (click)="edit.emit()"
      >
        Edit
      </button>
      <button
        type="button"
        class="card__btn card__btn--danger"
        [attr.aria-label]="'Delete ' + project().name"
        (click)="delete.emit()"
      >
        Delete
      </button>
    </div>
  </footer>
</article>
