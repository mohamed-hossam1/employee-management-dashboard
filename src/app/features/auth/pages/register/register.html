<section class="register" aria-labelledby="register-heading">
  <h1 id="register-heading" class="register__title">Create your account</h1>
  <p class="register__subtitle">Start managing your team in seconds.</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    @if (formError()) {
      <p class="register__form-error" role="alert">{{ formError() }}</p>
    }

    <app-form-field controlId="name" label="Full name" [error]="nameError()">
      <input
        id="name"
        type="text"
        formControlName="name"
        autocomplete="name"
        class="register__input"
        [attr.aria-invalid]="nameError() ? 'true' : null"
        [attr.aria-describedby]="nameError() ? 'name-error' : null"
      />
    </app-form-field>

    <app-form-field controlId="email" label="Email" [error]="emailError()">
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        class="register__input"
        [attr.aria-invalid]="emailError() ? 'true' : null"
        [attr.aria-describedby]="emailError() ? 'email-error' : null"
      />
    </app-form-field>

    <app-form-field controlId="password" label="Password" [error]="passwordError()">
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="new-password"
        class="register__input"
        [attr.aria-invalid]="passwordError() ? 'true' : null"
        [attr.aria-describedby]="passwordError() ? 'password-error' : null"
      />
    </app-form-field>

    <app-form-field controlId="confirmPassword" label="Confirm password" [error]="confirmError()">
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        class="register__input"
        [attr.aria-invalid]="confirmError() ? 'true' : null"
        [attr.aria-describedby]="confirmError() ? 'confirmPassword-error' : null"
      />
    </app-form-field>

    <button type="submit" class="register__submit" [disabled]="submitting() || form.invalid">
      {{ submitting() ? 'Creating account…' : 'Create account' }}
    </button>
  </form>

  <p class="register__footer">
    Already have an account?
    <a routerLink="/auth/login">Sign in</a>
  </p>
</section>
