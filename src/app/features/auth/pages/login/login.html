<section class="login" aria-labelledby="login-heading">
  <h1 id="login-heading" class="login__title">Welcome back</h1>
  <p class="login__subtitle">Sign in to continue to your dashboard.</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    @if (infoMessage()) {
      <p class="login__form-info" role="status">{{ infoMessage() }}</p>
    }
    @if (formError()) {
      <p class="login__form-error" role="alert">{{ formError() }}</p>
    }

    <app-form-field controlId="email" label="Email" [error]="emailError()">
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        class="login__input"
        [attr.aria-invalid]="emailError() ? 'true' : null"
        [attr.aria-describedby]="emailError() ? 'email-error' : null"
      />
    </app-form-field>

    <app-form-field controlId="password" label="Password" [error]="passwordError()">
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="login__input"
        [attr.aria-invalid]="passwordError() ? 'true' : null"
        [attr.aria-describedby]="passwordError() ? 'password-error' : null"
      />
    </app-form-field>

    <button type="submit" class="login__submit" [disabled]="submitting() || form.invalid">
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>

  <p class="login__footer">
    New here?
    <a routerLink="/auth/register">Create an account</a>
  </p>
</section>
